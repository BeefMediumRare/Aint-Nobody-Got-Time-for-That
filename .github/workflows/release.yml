name: Release to AMO

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Check tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest" ]; then
            echo "Tag $GITHUB_REF_NAME ($tag) does not match manifest version $manifest." >&2
            exit 1
          fi

      - name: Run tests
        run: |
          for f in test/*.test.js; do
            echo "running $f"
            node "$f"
          done

      - name: Sign and submit to AMO
        run: npx --yes web-ext@10.4.0 sign --channel=listed
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
